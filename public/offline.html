<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline · Writer's Cube</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 2rem;
        text-align: center;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #edeeeb;
        color: #2e323b;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #1b1e23; color: #e9eae7; }
      }
      svg { width: 64px; height: 64px; }
      h1 { font-size: 1.25rem; margin: 0; }
      p { margin: 0; max-width: 28ch; opacity: 0.75; line-height: 1.5; }
      button {
        margin-top: 0.5rem;
        padding: 0.6rem 1.4rem;
        border: 0;
        border-radius: 999px;
        background: #566b7e;
        color: #fff;
        font-size: 0.95rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 2.5 21 7l-9 4.5L3 7l9-4.5Z" fill="#9bb0a0" />
      <path d="M3 7l9 4.5V21l-9-4.5V7Z" fill="#5e7488" />
      <path d="M21 7l-9 4.5V21l9-4.5V7Z" fill="#6f6480" />
    </svg>
    <h1>You're offline</h1>
    <p>This page isn't available without a connection yet. Your saved work is safe — reconnect to pick up where you left off.</p>
    <button onclick="location.reload()">Try again</button>
  </body>
</html>
